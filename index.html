<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¿Quieres salir conmigo? ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
emailjs.init({ publicKey: "1D-czOBHLQIP_OYO1" });
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
min-height:100vh;display:flex;justify-content:center;align-items:center;overflow:hidden}
.container{
background:white;width:90%;max-width:550px;padding:30px;border-radius:25px;
text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.2);position:relative;z-index:2}
.hidden{display:none}
h1{color:#ff4d6d;margin-bottom:15px}
button{border:none;padding:12px 25px;border-radius:12px;cursor:pointer;font-size:18px;transition:.3s}
#si{background:#4CAF50;color:white}
#no{background:#f44336;color:white}
input,select{width:100%;padding:12px;margin:10px 0;border-radius:10px;border:1px solid #ccc}
.confirmar{background:#ff4d6d;color:white;width:100%}
.heart{position:absolute;animation:float 8s linear infinite;user-select:none}
@keyframes float{from{transform:translateY(100vh)}to{transform:translateY(-100px)}}
.confeti{position:fixed;font-size:25px;pointer-events:none;animation:caer 3s linear forwards;z-index:9999}
@keyframes caer{
0%{transform:translateY(-50px) rotate(0deg);opacity:1}
100%{transform:translateY(100vh) rotate(720deg);opacity:0}
}
#gif{border-radius:15px;margin-bottom:15px;max-width:250px}
</style>
</head>
<body>

<div id="inicio" class="container">
<h1>❤️ Tengo una pregunta ❤️</h1>

<img id="gif" src="gif1.gif">

<p id="pregunta" style="margin-bottom:15px;">
¿Te gustaría tener una cita conmigo?
</p>

<p id="contador">Intentos de decir que no: 0 😏</p>
<br>

<button id="si">Sí ❤️</button>
<button id="no">No 😅</button>
</div>

<div id="cita" class="container hidden">
<h1>🥰 ¡Vamooooo!</h1>
<p>Elige una fecha y un plan:</p>

<input type="date" id="fecha">

<select id="plan">
<option value="">Selecciona un plan</option>
<option>Cine 🎬</option>
<option>Cena 🍝</option>
<option>Helados 🍦</option>
<option>Paseo 🌅</option>
<option>Picnic 🧺</option>
<option>Lo que tú quieras ❤️</option>
</select>

<button class="confirmar" onclick="confirmar()">
Confirmar cita 💖
</button>
</div>

<div id="final" class="container hidden">
<h1>💖 ¡Cita Confirmada! 💖</h1>

<img src="foto.jpg" width="250" style="border-radius:15px;margin-bottom:15px;">

<p id="resultado"></p>
<h3>✨ Ya estoy esperando ese día ✨</h3>
</div>

<script>
const botonNo=document.getElementById("no");
const botonSi=document.getElementById("si");
const gif=document.getElementById("gif");

let intentos=0;
let escalaSi=1;
let escalaNo=1;

const gifs=[
"gif1.gif","gif2.gif","gif3.gif","gif4.gif","gif5.gif"
];

const mensajes=[
"¿Segura? 🥺",
"¿Pero segura segura? 😭",
"Prometo que será divertido ❤️",
"Vamos, dame una oportunidad 😌",
"Mi mamá ya sabe de ti 😳",
"El botón correcto es Sí 😎",
"Ya casi no queda botón 😏",
"Ríndete jajaja ❤️"
];

function moverBoton(){
intentos++;

document.getElementById("contador").innerHTML=
`Intentos de decir que no: ${intentos} 😏`;

const x=Math.random()*(window.innerWidth-120);
const y=Math.random()*(window.innerHeight-80);

botonNo.style.position="fixed";
botonNo.style.left=x+"px";
botonNo.style.top=y+"px";

escalaSi+=0.15;
escalaNo-=0.08;

if(escalaNo<0.2) escalaNo=0.2;

botonSi.style.transform=`scale(${escalaSi})`;
botonNo.style.transform=`scale(${escalaNo})`;

document.getElementById("pregunta").innerText=
mensajes[Math.min(intentos-1,mensajes.length-1)];

gif.src=gifs[Math.floor(Math.random()*gifs.length)];

if(intentos>=10){
botonNo.style.display="none";
}
}

botonNo.addEventListener("mouseover", moverBoton);
botonNo.addEventListener("touchstart", function(e){
e.preventDefault();
moverBoton();
});

document.getElementById("si").addEventListener("click", ()=>{
document.getElementById("inicio").classList.add("hidden");
document.getElementById("cita").classList.remove("hidden");
});

function lanzarConfeti(){
const emojis=["🎉","🎊","💖","❤️","🥰","✨"];
for(let i=0;i<80;i++){
const c=document.createElement("div");
c.className="confeti";
c.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];
c.style.left=Math.random()*window.innerWidth+"px";
c.style.animationDuration=(2+Math.random()*2)+"s";
document.body.appendChild(c);
setTimeout(()=>c.remove(),4000);
}
}

function confirmar(){
const fecha=document.getElementById("fecha").value;
const plan=document.getElementById("plan").value;

if(!fecha || !plan){
alert("Debes seleccionar una fecha y un plan ❤️");
return;
}

emailjs.send(
"service_c4vwp6f",
"template_s9bbiwm",
{fecha:fecha,plan:plan}
)
.then(function(){

lanzarConfeti();

document.getElementById("cita").classList.add("hidden");
document.getElementById("final").classList.remove("hidden");

document.getElementById("resultado").innerHTML=
`Nuestra cita será el <b>${fecha}</b><br><br>Plan elegido: <b>${plan}</b>`;
})
.catch(function(error){
alert("Hubo un problema al enviar la confirmación.");
console.error(error);
});
}

function crearCorazon(){
const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";
heart.style.left=Math.random()*window.innerWidth+"px";
heart.style.fontSize=(20+Math.random()*25)+"px";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),8000);
}
setInterval(crearCorazon,500);
</script>
</body>
</html>
